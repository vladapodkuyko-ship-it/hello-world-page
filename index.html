<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello World</title>
    <meta name="description" content="Simple Hello World page deployed with GitHub Pages.">
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fb;
        color: #172033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          linear-gradient(135deg, rgba(67, 126, 247, 0.16), transparent 36%),
          linear-gradient(315deg, rgba(36, 174, 151, 0.18), transparent 38%),
          #f7f8fb;
      }

      main {
        width: min(100%, 720px);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(48px, 12vw, 112px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        max-width: 520px;
        margin: 24px auto 0;
        color: #536079;
        font-size: clamp(18px, 3vw, 24px);
        line-height: 1.5;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 22px;
        padding: 10px 14px;
        border: 1px solid rgba(23, 32, 51, 0.12);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: #30405c;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #24ae97;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge"><span class="dot"></span>Deployed with GitHub Pages</div>
      <h1>Hello World</h1>
      <p>Перша сторінка готова і живе у Git.</p>
    </main>
  </body>
</html>
